services:
  ai-video-transcriber:
    build: .
    ports:
      - "8099:8099"
    environment:
      # Required: OpenAI API key (set in .env or override directly)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_api_key_here}
      # Optional: custom OpenAI-compatible endpoint
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      # Optional: default model name for an OpenAI-compatible local endpoint
      - LOCAL_MODEL_NAME=${LOCAL_MODEL_NAME:-}
      # Optional: maximum concurrent LLM requests during chunked processing
      - MAX_PARALLEL_LLM_REQUESTS=${MAX_PARALLEL_LLM_REQUESTS:-4}
      # Optional: Whisper model size
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      # Optional: Whisper device and compute precision (Docker Compose defaults to NVIDIA GPU)
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cuda}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-float16}
      # Runtime caches: keep downloaded models/player metadata across container recreates
      - XDG_CACHE_HOME=/app/.cache
      - HF_HOME=/app/.cache/huggingface
      # NVIDIA Container Toolkit
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      # Server configuration
      - HOST=0.0.0.0
      - PORT=8099
    volumes:
      # Mount the temp directory so downloaded/generated files are easy to inspect and manage.
      - ./temp:/app/temp
      # Keep downloaded Whisper/Hugging Face models between container recreates.
      - huggingface-cache:/app/.cache/huggingface
      # Keep yt-dlp runtime cache between container recreates.
      - yt-dlp-cache:/app/.cache/yt-dlp
    restart: unless-stopped
    
    # Resource limits (optional)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  huggingface-cache:
  yt-dlp-cache:
